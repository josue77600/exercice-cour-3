<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jim Ha Kha</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8f9fa;min-height:100vh;display:flex;justify-content:center;padding:16px 10px 40px;color:#1a1a2e;}
#aw{width:100%;max-width:480px;}
.ah{display:flex;justify-content:space-between;margin-bottom:4px;}
.ab,.al{font-size:10px;color:#888;}
.at{text-align:center;margin-bottom:4px;}
.at h1{font-size:20px;font-weight:600;}
.at p{font-size:11px;color:#888;}
.dv{height:1px;background:#e8e8e8;margin:7px 0 11px;}
.mr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mb{color:#fff;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:600;background:#1a5fb4;}
.chips{display:flex;gap:5px;}
.chip{border-radius:20px;padding:3px 9px;font-size:10px;border:1px solid;font-weight:500;}
.cs{background:#d1fae5;border-color:#6ee7b7;color:#065f46;}
.ck{background:#fef3c7;border-color:#fcd34d;color:#92400e;}
.ct{background:#f3f4f6;border-color:#d1d5db;color:#6b7280;}
.pg{width:100%;height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:12px;overflow:hidden;}
.pf{height:100%;background:#1a5fb4;border-radius:2px;transition:width .4s ease;}
.cg{font-size:12px;color:#555;text-align:center;margin-bottom:10px;padding:8px 12px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;line-height:1.6;}

/* carte question — lettre bien centrée, rien ne déborde */
.qcard{
  border:1.5px solid #e5e7eb;border-radius:16px;
  padding:20px 70px 20px 20px; /* padding-right pour le bouton son */
  margin-bottom:14px;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.04);
  position:relative;min-height:180px;width:100%;
}
/* lettre arabe — taille réduite + line-height généreux pour les descendantes */
.q-ar{
  font-family:'Scheherazade New',serif;
  font-size:72px;color:#1a1a2e;
  line-height:1.6; /* espace suffisant pour ـج ـح ـخ qui descendent */
  text-align:center;display:block;width:100%;
  padding:0 4px;
}
.form-badge{
  font-size:10px;color:#aaa;letter-spacing:.06em;
  text-transform:uppercase;text-align:center;
  margin-top:2px;
}
/* bouton son — collé à droite, centré verticalement */
.snd-btn{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  border:none;background:#eff6ff;border-radius:50%;
  width:44px;height:44px;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.1);flex-shrink:0;
  transition:all .2s;
}

/* chrono — en haut à gauche quand bouton son est à droite, sinon en haut à droite */
.cwrap{position:absolute;top:12px;left:14px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.cwrap.right{left:auto;right:14px;}
.cring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;border:3px solid #e5e7eb;background:#f9fafb;transition:all .3s;}
.cring.warn{border-color:#f59e0b;color:#d97706;}
.cring.danger{border-color:#ef4444;color:#dc2626;animation:pulse .5s ease infinite alternate;}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.1)}}
.clbl{font-size:8px;color:#aaa;letter-spacing:.05em;text-transform:uppercase;}

/* choix 2×2 */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:12px;}
.cho{border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;color:#1a1a2e;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:80px;padding:14px 10px;font-family:'Inter',sans-serif;}
.cho:hover:not(:disabled){transform:translateY(-2px);border-color:#93c5fd;box-shadow:0 3px 10px rgba(0,0,0,.08);}
.cho:active:not(:disabled){transform:scale(.97);}
.cho-name{font-size:17px;font-weight:600;}
.cho-tr{font-size:11px;color:#888;}
.cho.ok{background:#d1fae5!important;border-color:#22c55e!important;color:#065f46!important;transform:scale(1.04);}
.cho.ko{background:#fee2e2!important;border-color:#ef4444!important;color:#991b1b!important;}
.cho.timeout{background:#fef3c7!important;border-color:#f59e0b!important;color:#92400e!important;}

.fb{min-height:22px;text-align:center;font-size:13px;margin-bottom:6px;font-weight:600;}
.fb.ok{color:#16a34a;}
.fb.ko{color:#dc2626;}
.fb.to{color:#d97706;}
.spd{display:inline-block;margin-left:6px;font-size:11px;color:#dc2626;font-weight:700;}

.lu{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:2rem 0;}
.rg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;width:100%;max-width:310px;margin:0 auto;}
.rc{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:12px 6px;display:flex;flex-direction:column;gap:3px;align-items:center;}
.rcv{font-size:24px;font-weight:700;}
.rcl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.08em;}
.res{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:1.5rem 0;}
.rfn{font-size:12px;color:#dc2626;font-weight:500;}
.rmt{font-size:14px;font-weight:700;padding:6px 20px;border-radius:20px;}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.bp{border:none;border-radius:12px;padding:11px 26px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;background:#1a5fb4;}
.bs{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:12px;padding:11px 26px;font-size:13px;font-weight:600;color:#555;cursor:pointer;}
.gcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;width:100%;max-width:300px;}
.grow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12px;border-bottom:1px solid #f3f4f6;}
.grow:last-child{border-bottom:none;font-weight:700;font-size:13px;padding-top:10px;}
.gbar{height:4px;border-radius:2px;background:#e5e7eb;width:60px;display:inline-block;vertical-align:middle;margin:0 6px;overflow:hidden;}
.gfill{height:100%;border-radius:2px;}
</style>

function playTone(f,d,type,vol){
  try{
    if(!_AC||_AC.state==="closed")_AC=new(window.AudioContext||window.webkitAudioContext)();
    var ac=_AC;
    function _p(){try{var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type||"sine";o.frequency.value=f;var t=ac.currentTime;g.gain.setValueAtTime(vol||0.25,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);o.start(t);o.stop(t+d+0.1);}catch(e){}}
    if(ac.state==="running"){_p();}else{ac.resume().then(_p).catch(function(){});}
  }catch(e){}
}

var AUDIO_CACHE={};
Object.keys(AUDIO_DATA).forEach(function(ar){var a=new Audio();a.src=AUDIO_DATA[ar];a.preload="auto";AUDIO_CACHE[ar]=a;});
var _curAudio=null;
function playLetter(ar){
  if(_curAudio){_curAudio.pause();_curAudio.currentTime=0;}
  var a=AUDIO_CACHE[ar];if(!a)return;_curAudio=a;
  a.currentTime=0;
  a.play().catch(function(){var a2=new Audio(AUDIO_DATA[ar]);AUDIO_CACHE[ar]=a2;_curAudio=a2;a2.play().catch(function(){});});
}
function bindSoundBtn(ar){
  var vb=document.getElementById("vbtn");
  if(!vb)return;
  vb.onclick=function(){
    playLetter(ar);

    setTimeout(function(){var v=document.getElementById("vbtn");if(v){v.style.background="#eff6ff";v.style.transform="scale(1)";}},400);
  };
}

function stopTimer(){if(_timer){clearInterval(_timer);_timer=null;}}

function shNoConsec(arr){
  for(var tries=0;tries<200;tries++){
    var b=sh(arr);var ok=true;
    for(var i=1;i<b.length;i++){
      if(b[i].letter&&b[i-1].letter&&b[i].letter.ar===b[i-1].letter.ar){ok=false;break;}
    }
    if(ok)return b;
  }
  return sh(arr);
}

function pick4(correct,pool){
  var others=sh(pool.filter(function(l){return l.ar!==correct.ar;})).slice(0,3);
  return sh([correct].concat(others));
}

// ── BUILD QUEUE ──
function buildQueue(lv){
  var pool=[];
  if(lv===1){
    LETTERS3.forEach(function(l){for(var i=0;i<4;i++)pool.push({letter:l,form:"ini"});});
    return shNoConsec(pool);
  }
  if(lv===2){
    LETTERS3.forEach(function(l){["ini","med","fin"].forEach(function(fm){pool.push({letter:l,form:fm});});});
    return shNoConsec(sh(pool.concat(sh(pool).slice(0,3))).slice(0,12));
  }
  if(lv===3){
    LETTERS3.forEach(function(l){["ini","med","fin"].forEach(function(fm){pool.push({letter:l,form:fm});});});
    return sh(pool.concat(sh(pool).slice(0,3))).slice(0,12);
  }
  if(lv===4){
    LETTERS7.forEach(function(l){pool.push({letter:l,form:"ini"});});
    var extra=sh(LETTERS7).slice(0,5).map(function(l){return{letter:l,form:"ini"};});
    return shNoConsec(sh(pool.concat(extra)).slice(0,12));
  }
  // niv 5
  LETTERS7.forEach(function(l){["ini","med","fin"].forEach(function(fm){pool.push({letter:l,form:fm});});});
  return sh(pool).slice(0,12);
}

// ── START ──
function start(lv){
  stopTimer();
  var Q=buildQueue(lv);
  var pool=lv<=3?LETTERS3:LETTERS7;
  S={lv:lv,N:Q.length,queue:Q,cur:null,choices:[],pool:pool,sc:0,tot:0,str:0,best:0,ans:false,bonusTotal:0,timeLeft:CHRONO};
  next();
}

// ── NEXT ──
function next(){
  stopTimer();S.ans=false;S.timeLeft=CHRONO;
  if(!S.queue.length){finish();return;}
  S.cur=S.queue.shift();
  S.choices=pick4(S.cur.letter,S.pool);
  render();
  if(S.lv===3)startChrono();
}

// ── CHRONO ──
function startChrono(){
  _timer=setInterval(function(){
    S.timeLeft--;
    var el=document.getElementById("cnum"),ring=document.getElementById("cring");
    if(el)el.textContent=S.timeLeft;
    if(ring)ring.className="cring"+(S.timeLeft<=1?" danger":S.timeLeft<=2?" warn":"");
    if(S.timeLeft<=1)sTick();
    if(S.timeLeft<=0){stopTimer();if(!S.ans)doTimeout();}
  },1000);
}
function doTimeout(){
  if(S.ans)return;
  S.ans=true;S.tot++;S.str=0;sTo();
  var correct=S.cur.letter;
  document.querySelectorAll(".cho").forEach(function(b,i){b.disabled=true;if(S.choices[i].ar===correct.ar)b.classList.add("timeout");});
  var fb=document.getElementById("fb");
  if(fb){fb.className="fb to";fb.textContent="\u23F0 Temps\u00a0! C\u2019est "+correct.name+" ("+correct.ar+")";}
  setTimeout(next,1400);
}

// ── ANSWER ──
function answer(idx){
  if(S.ans)return;
  stopTimer();S.ans=true;S.tot++;
  var ok=S.choices[idx].ar===S.cur.letter.ar;
  var bonus=0;
  if(ok){
    sOk();S.sc++;S.str++;if(S.str>S.best)S.best=S.str;
    if(S.lv===3){var used=CHRONO-S.timeLeft;bonus=used<=0?3:used<=1?2:used<=2?1:0;S.bonusTotal+=bonus;}
  }else{sWr();S.str=0;}
  document.querySelectorAll(".cho").forEach(function(b,i){
    b.disabled=true;
    if(S.choices[i].ar===S.cur.letter.ar)b.classList.add("ok");
    else if(i===idx&&!ok)b.classList.add("ko");
  });
  var fb=document.getElementById("fb");
  if(fb){
    fb.className="fb "+(ok?"ok":"ko");
    var txt=(ok?"\u2713 Bravo\u00a0! ":"\u2717 ")+"C\u2019est "+S.cur.letter.name+" ("+S.cur.letter.ar+")";
    if(ok&&bonus>0)txt+="<span class='spd'>+"+bonus+" bonus \u26a1</span>";
    fb.innerHTML=txt;
  }
  setTimeout(next,1300);
}

// ── RENDER ──
function render(){
  var lv=S.lv,c=S.cur,N=S.N;
  var pct=(S.tot/N)*100;
  var haSound=(lv===1||lv===4);
  var cardPad=haSound?"padding:20px 70px 20px 20px":"padding:20px";

  var sub=lv===1?"Forme isol\u00e9e \u2014 J\u00eem, \u1e24\u00e2, Kh\u00e2":
           lv===2?"Toutes les formes \u2014 J\u00eem, \u1e24\u00e2, Kh\u00e2":
           lv===3?"Tout m\u00e9lang\u00e9 \u2014 4 secondes\u00a0!":
           lv===4?"Forme initiale \u2014 les 7 lettres":
                  "Toutes les formes \u2014 les 7 lettres";
  var csg=lv===1?"Regarde la lettre isol\u00e9e et clique sur son nom. Appuie sur \uD83D\uDD0A pour l\u2019\u00e9couter.":
           lv===2?"Reconnais la forme de la lettre et clique sur son nom.":
           lv===3?"Identifie la lettre vite\u00a0! Bonus si tu r\u00e9ponds rapidement.":
           lv===4?"Regarde la forme initiale et clique sur son nom. Appuie sur \uD83D\uDD0A pour l\u2019\u00e9couter.":
                  "Reconnais la forme de la lettre parmi les 7 et clique sur son nom.";

  var formLabels={ini:"D\u00e9but de mot",med:"Milieu de mot",fin:"Fin de mot"};
  var displayAr=(lv===1||lv===4)?c.letter.ar:c.letter[c.form];
  var showFormBadge=(lv===2||lv===3||lv===5);
  var badgeLabel=(lv<=3)?"JIM \u1e24A KHA":"LETTRES 1\u20137";
  var bonusChip=lv===3?"<span class='chip' style='background:#fff5f5;border-color:#fecaca;color:#dc2626'>\u26a1 "+S.bonusTotal+"</span>":"";
  var chronoHTML=lv===3?"<div class='cwrap right'><div class='cring' id='cring'><span id='cnum'>"+S.timeLeft+"</span></div><div class='clbl'>sec</div></div>":"";

  var soundHTML=haSound?"<button id='vbtn' class='snd-btn'>&#128266;</button>":"";
  var badgeHTML=showFormBadge?"<div class='form-badge'>"+formLabels[c.form]+"</div>":"";

  var chHTML=S.choices.map(function(l){
    return "<button class='cho'><span class='cho-name'>"+l.name+"</span><span class='cho-tr'>/"+l.tr+"/</span></button>";
  }).join("");

  document.getElementById("app").innerHTML=
    "<div class='ah'><span class='ab'>M\u00e9thode Alif</span><span class='al'>J\u00eem \u1e24\u00e2 Kh\u00e2</span></div>"+
    "<div class='at'><h1>"+LV_NAME[lv]+"</h1><p>"+sub+"</p></div>"+
    "<div class='dv'></div>"+
    "<div class='mr'><span class='mb'>"+badgeLabel+" \u00b7 "+LV_NAME[lv]+"</span>"+
    "<div class='chips'><span class='chip cs'>\u2713 "+S.sc+"</span><span class='chip ck'>\uD83D\uDD25 "+S.str+"</span>"+bonusChip+"<span class='chip ct'>"+S.tot+"/"+N+"</span></div></div>"+
    "<div class='pg'><div class='pf' style='width:"+pct+"%'></div></div>"+
    "<div class='cg'>"+csg+"</div>"+
    "<div class='qcard' style='"+cardPad+"'>"+
      "<div class='q-ar'>"+displayAr+"</div>"+
      soundHTML+
      badgeHTML+
      chronoHTML+
    "</div>"+
    "<div class='choices'>"+chHTML+"</div>"+
    "<div class='fb' id='fb'></div>";

  document.querySelectorAll(".cho").forEach(function(b,i){b.onclick=function(){answer(i);};});
  if(haSound) bindSoundBtn(c.letter.ar);
}

// ── FINISH ──
function finish(){
  stopTimer();
  var pct=Math.round(S.sc/S.N*100);
  GLOBAL[S.lv]={sc:S.sc,N:S.N,pct:pct};
  var passed=pct>=80;
  var lv=S.lv;

  if(passed&&lv<5){
    sWin();setTimeout(sLvl,400);
    var nLv=lv+1;
    var nSubs={2:"toutes les formes des 3 lettres\u00a0!",3:"vitesse maximale\u00a0!",4:"les 7 premi\u00e8res lettres en forme initiale\u00a0!",5:"les 7 lettres dans toutes leurs formes\u00a0!"};
    document.getElementById("app").innerHTML=
      "<div class='lu'>"+
      "<div style='font-size:68px'>\uD83C\uDF89</div>"+
      "<div style='font-size:22px;font-weight:700'>"+LV_NAME[lv]+" r\u00e9ussi\u00a0!</div>"+
      "<div style='font-size:40px;font-weight:700;color:#22c55e'>"+S.sc+"/"+S.N+" \u2014 "+pct+"%</div>"+
      "<div style='font-size:13px;color:#666;line-height:1.7;max-width:300px;text-align:center'>Macha\u2019Allah\u00a0! Tu passes au <strong>"+LV_NAME[nLv]+"</strong> \u2014 "+nSubs[nLv]+"</div>"+
      "<div class='rg'>"+
        "<div class='rc'><div class='rcv' style='color:#16a34a'>"+S.sc+"</div><div class='rcl'>R\u00e9ussis</div></div>"+
        "<div class='rc'><div class='rcv' style='color:#dc2626'>"+(S.N-S.sc)+"</div><div class='rcl'>Rat\u00e9s</div></div>"+
        "<div class='rc'><div class='rcv' style='color:#1a5fb4'>"+S.best+"</div><div class='rcl'>S\u00e9rie</div></div>"+
      "</div>"+
      "<div class='br'><button class='bp' id='bNxt'>"+LV_NAME[nLv]+" \u2192</button><button class='bs' id='bRpl'>Refaire "+LV_NAME[lv]+"</button></div>"+
      "</div>";
    document.getElementById("bNxt").onclick=function(){start(nLv);};
    document.getElementById("bRpl").onclick=function(){start(lv);};
    return;
  }

  sWin();
  var emoji=pct>=90?"\uD83C\uDFC6":pct>=80?"\u2B50":"\uD83D\uDCDA";
  var men=pct>=90?"Excellent":pct>=80?"Tr\u00e8s bien":pct>=50?"Assez bien":"\u00c0 revoir";
  var mc=pct>=90?"#16a34a":pct>=80?"#1a5fb4":pct>=50?"#d97706":"#dc2626";
  var finalMsg=lv===5&&passed?"\uD83C\uDF93 Macha\u2019Allah\u00a0! Tu ma\u00eetrises les 7 premi\u00e8res lettres\u00a0!":
    pct>=80?"Continue, tr\u00e8s bon travail\u00a0!":pct>=50?"Revise et recommence\u00a0!":"Continue \u00e0 t\u2019entra\u00eener\u00a0!";
  var bonusLine=lv===3?"<div style='background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:8px 14px;font-size:12px;color:#dc2626;text-align:center'>\u26a1 Bonus vitesse\u00a0: <strong>+"+S.bonusTotal+" pts</strong></div>":"";

  var lvDone=Object.keys(GLOBAL).length;
  var globalHTML="";
  if(lvDone>=2){
    var tot=0,cnt=0,rows="";
    [1,2,3,4,5].forEach(function(l){
      if(!GLOBAL[l])return;tot+=GLOBAL[l].pct;cnt++;
      var p=GLOBAL[l].pct,pc=p>=80?"#16a34a":p>=60?"#d97706":"#dc2626";
      rows+="<div class='grow'><span style='color:#555'>"+LV_NAME[l]+"</span><span><span class='gbar'><span class='gfill' style='width:"+p+"%;background:"+pc+"'></span></span><span style='font-weight:600;color:"+pc+"'>"+p+"%</span></span></div>";
    });
    var avg=Math.round(tot/cnt);
    var ac=avg>=80?"#16a34a":avg>=60?"#d97706":"#dc2626";
    var grade=avg>=90?"A+":avg>=80?"A":avg>=70?"B":avg>=60?"C":"D";
    rows+="<div class='grow'><span>Moyenne g\u00e9n\u00e9rale</span><span style='color:"+ac+";font-weight:700'>"+avg+"% \u2014 "+grade+"</span></div>";
    globalHTML="<div class='gcard'>"+rows+"</div>";
  }

  document.getElementById("app").innerHTML=
    "<div class='res'>"+
    "<div style='font-size:64px'>"+emoji+"</div>"+
    "<div style='font-size:11px;color:#aaa;letter-spacing:.1em;text-transform:uppercase'>R\u00e9sultat \u2014 "+LV_NAME[lv]+"</div>"+
    "<div style='font-size:42px;font-weight:700;color:#1a5fb4'>"+S.sc+"/"+S.N+"</div>"+
    "<div style='font-size:15px;color:#888'>"+pct+"%</div>"+
    (!passed?"<div class='rfn'>80% requis pour passer au niveau suivant</div>":"")+
    bonusLine+
    "<div class='rg'><div class='rc'><div class='rcv' style='color:#16a34a'>"+S.sc+"</div><div class='rcl'>R\u00e9ussis</div></div><div class='rc'><div class='rcv' style='color:#dc2626'>"+(S.N-S.sc)+"</div><div class='rcl'>Rat\u00e9s</div></div><div class='rc'><div class='rcv' style='color:#1a5fb4'>"+S.best+"</div><div class='rcl'>S\u00e9rie</div></div></div>"+
    globalHTML+
    "<div class='rmt' style='background:"+mc+"18;color:"+mc+";border:1.5px solid "+mc+"44'>"+men+"</div>"+
    "<div style='font-size:13px;color:#555;text-align:center'>"+finalMsg+"</div>"+
    "<div class='br'><button class='bp' id='bRpl'>"+(lv===5&&passed?"\uD83D\uDD01 Recommencer depuis le d\u00e9but":"Rejouer")+"</button></div>"+
    "</div>";
  document.getElementById("bRpl").onclick=function(){if(lv===5&&passed){GLOBAL={};start(1);}else{start(lv);}};
}

start(1);
</script>
